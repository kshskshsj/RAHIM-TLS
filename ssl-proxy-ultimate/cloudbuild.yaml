steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ssl-proxy-ultimate'
      - '--source=.'
      - '--region=southamerica-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=USERNAME=RAHIMDX,PASSWORD=RAHIMDX,PATH_ROUTE=/app17'

timeout: '900s'
